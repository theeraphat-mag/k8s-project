---
- name: Deploy Backend on Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    k8s_namespace: monkeypop
    image_name: theeraphat7/monkeypop-backend
    image_tag: latest
    kubeconfig_path: "{{ lookup('env', 'KUBECONFIG') | default(lookup('env', 'HOME') + '/.kube/config', true) }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  tasks:
    - name: Create monkeypop namespace
      ansible.builtin.shell: |
        set -e
        kubectl create namespace {{ k8s_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      args:
        executable: /bin/bash

    - name: Create backend config map
      ansible.builtin.shell: |
        set -e
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: backend-config
          namespace: {{ k8s_namespace }}
        data:
          REDIS_URL: redis://redis:6379
        EOF
      args:
        executable: /bin/bash

    - name: Create backend secret
      ansible.builtin.shell: |
        set -e
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: backend-secret
          namespace: {{ k8s_namespace }}
        type: Opaque
        data:
          API_KEY: bW9ua2V5LXNlY3JldC1rZXk=
        EOF
      args:
        executable: /bin/bash

    - name: Deploy Backend Deployment
      ansible.builtin.shell: |
        set -e
        cat <<'EOF' | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: backend
          namespace: {{ k8s_namespace }}
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: backend
          template:
            metadata:
              labels:
                app: backend
            spec:
              containers:
              - name: backend
                image: "{{ image_name }}:{{ image_tag }}"
                ports:
                - containerPort: 3001
                env:
                - name: REDIS_URL
                  valueFrom:
                    configMapKeyRef:
                      name: backend-config
                      key: REDIS_URL
                - name: API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backend-secret
                      key: API_KEY
        EOF
      args:
        executable: /bin/bash

    - name: Create Backend Service
      ansible.builtin.shell: |
        set -e
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: backend
          namespace: {{ k8s_namespace }}
        spec:
          type: NodePort
          selector:
            app: backend
          ports:
          - port: 3001
            targetPort: 3001
            nodePort: 30002
        EOF
      args:
        executable: /bin/bash
