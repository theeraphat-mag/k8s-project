---
- name: Deploy Backend on Kubernetes
  hosts: server
  tasks:
    - name: Create a web-app namespace
      kubernetes.core.k8s:
        name: web-app
        api_version: v1
        kind: Namespace
        state: present

    - name: Deploy Backend Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: backend
            namespace: web-app
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: backend
            template:
              metadata:
                labels:
                  app: backend
              spec:
                containers:
                - name: backend
                  image: tapootum/test-backend:{{ version }}
                  ports:
                  - containerPort: 3001

    - name: Create Backend Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: backend-service
            namespace: web-app
          spec:
            type: NodePort
            selector:
              app: backend
            ports:
            - port: 3001
              targetPort: 3001
              nodePort: 30002
