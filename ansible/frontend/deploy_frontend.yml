- name: Deploy Frontend on Kubernetes
  hosts: server
  vars:
    version: "latest"
  tasks:
    - name: Create monkeypop namespace
      shell: export KUBECONFIG=/var/jenkins_home/.kube/config; kubectl create namespace monkeypop --dry-run=client -o yaml | kubectl apply -f - --validate=false

    - name: Deploy Frontend
      shell: |
        export KUBECONFIG=/var/jenkins_home/.kube/config
        kubectl apply -f - --validate=false <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: frontend
          namespace: monkeypop
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: frontend
          template:
            metadata:
              labels:
                app: frontend
            spec:
              containers:
              - name: frontend
                image: thamonwanfirst/monkeypop-frontend:{{ version }}
                imagePullPolicy: Always
                ports:
                - containerPort: 80
        EOF

    - name: Create Frontend Service
      shell: |
        export KUBECONFIG=/var/jenkins_home/.kube/config
        kubectl apply -f - --validate=false <<EOF
        apiVersion: v1
        kind: Service
        metadata:
          name: frontend
          namespace: monkeypop
        spec:
          type: NodePort
          selector:
            app: frontend
          ports:
          - port: 80
            targetPort: 80
            nodePort: 30001
        EOF

    - name: Force Rollout Restart
      shell: export KUBECONFIG=/var/jenkins_home/.kube/config; kubectl rollout restart deployment/frontend -n monkeypop