- name: Deploy Frontend on Kubernetes
  hosts: server
  vars:
    version: "latest"
  tasks:
    - name: Create web-app namespace
      shell: kubectl create namespace web-app --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy Frontend
      shell: |
        kubectl apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: frontend
          namespace: web-app
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: frontend
          template:
            metadata:
              labels:
                app: frontend
            spec:
              containers:
              - name: frontend
                image: theeraphat7/monkeypop-frontend:{{ version }}
                ports:
                - containerPort: 80
        EOF

    - name: Create Frontend Service
      shell: |
        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: Service
        metadata:
          name: frontend-service
          namespace: web-app
        spec:
          type: NodePort
          selector:
            app: frontend
          ports:
          - port: 80
            targetPort: 80
            nodePort: 30004
        EOF