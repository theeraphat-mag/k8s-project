---
- name: Deploy Frontend on Kubernetes
  hosts: wsl
  tasks:
    - name: Create a web-app namespace
      kubernetes.core.k8s:
        name: web-app
        api_version: v1
        kind: Namespace
        state: present

    - name: Deploy Frontend Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: frontend
            namespace: web-app
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: frontend
            template:
              metadata:
                labels:
                  app: frontend
              spec:
                containers:
                - name: frontend
                  image: tapootum/test-frontend:{{ version }}
                  ports:
                  - containerPort: 3000

    - name: Create Frontend Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: frontend-service
            namespace: web-app
          spec:
            type: NodePort
            selector:
              app: frontend
            ports:
            - port: 3000
              targetPort: 3000
              nodePort: 30300
