apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: monkeypop
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
    nodePort: 30002
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: monkeypop
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30001
