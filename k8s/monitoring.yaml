apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monkeypop
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'monkeypop-backend'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "3001"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monkeypop
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: Prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monkeypop
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'MonkeyPop Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-monkeypop
  namespace: monkeypop
data:
  monkeypop-dashboard.json: |
    {
      "annotations": { "list": [ { "builtIn": 1, "datasource": "-- Grafana --", "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard" } ] },
      "editable": true,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] } } },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "title": "Grand Total Pops",
          "targets": [ { "expr": "sum(monkey_pops_total)", "refId": "A" } ],
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 18, "x": 6, "y": 0 },
          "id": 2,
          "title": "Total Pops Over Time",
          "targets": [ { "expr": "sum(monkey_pops_total)", "refId": "A" } ],
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 6 },
          "id": 3,
          "title": "Memory Usage per Pod",
          "targets": [ { "expr": "process_resident_memory_bytes{job=\"monkeypop-backend\"}", "legendFormat": "{{instance}}", "refId": "A" } ],
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 6 },
          "id": 4,
          "title": "Top 5 Players",
          "targets": [ { "expr": "topk(5, sum by (username) (monkey_pops_total))", "refId": "A" } ],
          "type": "bargauge",
          "options": { "orientation": "vertical", "displayMode": "gradient" }
        }
      ],
      "schemaVersion": 38,
      "title": "MonkeyPop Monitoring",
      "uid": "monkeypop-monitor"
    }
