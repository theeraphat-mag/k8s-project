apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monkeypop
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'monkeypop-backend-k8s'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "3001"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
      - job_name: 'kubernetes-state'
        static_configs:
          - targets: ['kube-state-metrics:8080']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monkeypop
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: Prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monkeypop
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'MonkeyPop Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-monkeypop
  namespace: monkeypop
data:
  monkeypop-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "none"
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "Total Monkey Pops",
          "type": "stat",
          "targets": [{ "expr": "sum(monkey_pops_total)", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisLabel": "Restarts", "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1 },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            }
          },
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "single" } },
          "targets": [{ "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"monkeypop\"})", "refId": "A" }],
          "title": "Pod Restarts",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 12, "lineWidth": 2 }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } },
          "targets": [{ "expr": "sum by (phase) (kube_pod_status_phase{namespace=\"monkeypop\"})", "legendFormat": "{{phase}}", "refId": "A" }],
          "title": "Pods Status",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 12, "lineWidth": 2 },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } },
          "targets": [{ "expr": "sum by (pod) (process_resident_memory_bytes{job=\"monkeypop-backend-k8s\"})", "legendFormat": "{{pod}}", "refId": "A" }],
          "title": "Memory by Pod",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": [],
      "time": { "from": "now-15m", "to": "now" },
      "title": "MonkeyPop Monitoring",
      "uid": "monkeypop-monitor",
      "version": 2
    }
