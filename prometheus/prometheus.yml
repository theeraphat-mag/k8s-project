global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'monkeypop-backend'
    static_configs:
      # ใช้ IP นี้เพื่อบังคับให้วิ่งออกไปหาเครื่อง Host ที่เราเปิด Port-forward ไว้
      - targets: ['host.docker.internal:30002']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
