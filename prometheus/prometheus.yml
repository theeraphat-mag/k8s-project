global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'monkeypop-backend'
    static_configs:
      - targets: ['monkeypop-backend:3001']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
